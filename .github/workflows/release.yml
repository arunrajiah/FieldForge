name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install Composer dependencies (production only)
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build zip archive
        run: |
          ZIP_NAME="fieldforge-${{ steps.tag.outputs.TAG }}.zip"
          mkdir -p build/fieldforge

          # Copy plugin files into a fieldforge/ subdirectory so the zip
          # extracts as wp-content/plugins/fieldforge/ when installed via WP.
          cp fieldforge.php build/fieldforge/
          cp readme.txt CHANGELOG.md build/fieldforge/
          cp -r includes admin assets languages build/fieldforge/

          # Remove dev artifacts from the staged directory.
          find build/fieldforge -name '.*' -delete
          find build/fieldforge -type d -name node_modules -prune -exec rm -rf {} +

          # Create the zip from the staged directory.
          cd build
          zip -r "${ZIP_NAME}" fieldforge/ -x "*/.*"
          cd ..

          echo "Built build/${ZIP_NAME}"
          ls -lh "build/${ZIP_NAME}"

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: fieldforge-${{ steps.tag.outputs.TAG }}
          path: build/fieldforge-${{ steps.tag.outputs.TAG }}.zip
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FieldForge ${{ steps.tag.outputs.TAG }}
          body_path: CHANGELOG.md
          files: build/fieldforge-${{ steps.tag.outputs.TAG }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
