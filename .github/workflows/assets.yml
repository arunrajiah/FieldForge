name: Update WordPress.org Assets

# Updates the plugin's directory assets (icon, banner, screenshots) and the
# trunk readme on WordPress.org — without creating a new release/version.
#
# Runs automatically when files under .wordpress-org/ or readme.txt change on
# main, and can be triggered manually from the Actions tab.
#
# Uses the same secrets as deploy.yml:
#   WPORG_SVN_USERNAME, WPORG_SVN_PASSWORD

on:
  push:
    branches:
      - main
    paths:
      - '.wordpress-org/**'
      - 'readme.txt'
  workflow_dispatch:

jobs:
  assets:
    name: Update WP.org assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update plugin assets
        uses: 10up/action-wordpress-plugin-asset-update@stable
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
          SLUG: fieldom
          ASSETS_DIR: .wordpress-org
