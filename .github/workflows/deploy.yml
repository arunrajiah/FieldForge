name: Deploy to WordPress.org

# This workflow is DISABLED until the plugin is submitted to the
# WordPress.org plugin directory and SVN credentials are added to
# repository secrets.
#
# To enable:
#   1. Submit the plugin at https://wordpress.org/plugins/developers/add/
#   2. Wait for approval and receive the plugin slug.
#   3. Add repository secrets:
#        WPORG_SVN_USERNAME  — your WordPress.org username
#        WPORG_SVN_PASSWORD  — your WordPress.org password (or app password)
#   4. Change the trigger below from workflow_dispatch back to:
#        on:
#          push:
#            tags:
#              - 'v[0-9]+.[0-9]+.[0-9]+'
#
# Until then, releases are distributed as GitHub Release zip files only.
# See .github/workflows/release.yml for the zip build workflow.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v1.0.0)'
        required: true

jobs:
  deploy:
    name: Deploy to WP.org SVN
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Check SVN credentials are configured
        run: |
          if [ -z "$SVN_USERNAME" ] || [ -z "$SVN_PASSWORD" ]; then
            echo "::error::WPORG_SVN_USERNAME and WPORG_SVN_PASSWORD secrets are not set."
            echo "::error::Add them in Settings → Secrets → Actions before running this workflow."
            exit 1
          fi
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${INPUT_TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}

      - name: WordPress.org Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
          SLUG: fieldforge
          VERSION: ${{ steps.version.outputs.VERSION }}
          ASSETS_DIR: .wordpress-org
