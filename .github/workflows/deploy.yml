name: Deploy to WordPress.org

# Deploys the plugin to the WordPress.org SVN repository.
#
# Triggers automatically when a version tag (e.g. v0.1.1) is pushed, and can
# also be run manually from the Actions tab for a specific tag.
#
# Requires two repository secrets (Settings → Secrets and variables → Actions):
#   WPORG_SVN_USERNAME  — your WordPress.org username (arunrajiah)
#   WPORG_SVN_PASSWORD  — the SVN password from your WordPress.org profile
#                         (Account & Security → generate a new password)
#
# The plugin's `Stable tag` in readme.txt must match the version being deployed.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v0.1.1)'
        required: true

jobs:
  deploy:
    name: Deploy to WP.org SVN
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Check SVN credentials are configured
        run: |
          if [ -z "$SVN_USERNAME" ] || [ -z "$SVN_PASSWORD" ]; then
            echo "::error::WPORG_SVN_USERNAME and WPORG_SVN_PASSWORD secrets are not set."
            echo "::error::Add them in Settings → Secrets and variables → Actions before running this workflow."
            exit 1
          fi
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: |
          REF="${INPUT_TAG:-$GITHUB_REF_NAME}"
          echo "VERSION=${REF#v}" >> "$GITHUB_OUTPUT"
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}

      - name: WordPress.org Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
          SLUG: fieldom
          VERSION: ${{ steps.version.outputs.VERSION }}
          ASSETS_DIR: .wordpress-org
